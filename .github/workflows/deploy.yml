name: Deploy Betopia Limited Client

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -t betopialimited/betopia-limited-client:v1 .
          docker tag betopialimited/betopia-limited-client:v1 betopialimited/betopia-limited-client:${{ github.sha }}

      - name: Push Image
        run: |
          docker push betopialimited/betopia-limited-client:v1

      - name: Deploy to Production Server   # ✅ FIXED
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull betopialimited/betopia-limited-client:v1
            docker stop betopia-limited-client || true
            docker rm betopia-limited-client || true
            docker run -d \
              --name betopia-limited-client \
              -p 6001:6001 \
              --env-file /opt/betopia/client.env \
              --restart always \
              betopialimited/betopia-limited-client:v1